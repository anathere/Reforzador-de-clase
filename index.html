<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clases</title>

<style>
body{
font-family: Arial;
background:#f0f0f0;
padding:20px;
}

.pestanas{
display:flex;
gap:10px;
margin-bottom:15px;
}

.pestana{
padding:10px 20px;
background:#ddd;
border:2px solid #999;
cursor:pointer;
font-weight:bold;
}

.pestana.activa{
background:#fff;
}

.contenido{
display:none;
}

.contenido.activo{
display:block;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #aaa;
padding:5px;
text-align:center;
}

.nombre{
text-align:left;
font-weight:bold;
}

button{
margin-bottom:10px;
padding:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Registro de clase</h2>

<div class="pestanas">
<button id="btn-2B" class="pestana activa">Clase 2B</button>
<button id="btn-2A" class="pestana">Clase 2A</button>
</div>

<div id="2B" class="contenido activo"></div>
<div id="2A" class="contenido"></div>

<script>

const clases = {
"2B": ["Agustín","Facu","Felipe","Juanfra","Juanma","Julia","Lara","Lola","Lua","Luca","Lupe","Pili","Santi","Titi","Lolo","Guille","Toto"],
"2A": ["Tomás","Timoteo","Alfo B","Paz","Alfo G","Juan","Mateo","Giuliana","Bruno","Francisco","Alfonso","Franco","Guada","Vicente","Felipe","Isa","Lorenzo","Benjamín","Sofía"]
}

const criterios = ["Materiales","Cuerpo","Consignas","Silencio","Escucha"]

// CREAR TABLAS
function crearTabla(clase){
let html = `<button onclick="felices('${clase}')">😊 Todos felices</button>`
html += "<table><tr><th></th>"

criterios.forEach(c => html += "<th>"+c+"</th>")
html += "</tr>"

clases[clase].forEach((alumno,i)=>{
html += "<tr><td class='nombre'>"+alumno+"</td>"

criterios.forEach((c,j)=>{
let val = obtener(clase,i,j)
html += `<td>
<select onchange="guardar('${clase}',${i},${j},this.value)">
<option ${val=="•"?"selected":""}>•</option>
<option ${val=="🙂"?"selected":""}>🙂</option>
<option ${val=="😐"?"selected":""}>😐</option>
<option ${val=="🙁"?"selected":""}>🙁</option>
</select>
</td>`
})

html += "</tr>"
})

html += "</table>"

document.getElementById(clase).innerHTML = html
}

// GUARDAR
function guardar(clase,i,j,val){
let datos = JSON.parse(localStorage.getItem("datos")) || {}
datos[clase] = datos[clase] || []
datos[clase][i] = datos[clase][i] || []
datos[clase][i][j] = val
localStorage.setItem("datos", JSON.stringify(datos))
}

// OBTENER
function obtener(clase,i,j){
let datos = JSON.parse(localStorage.getItem("datos")) || {}
return datos[clase]?.[i]?.[j] || "•"
}

// TODOS FELICES
function felices(clase){
document.querySelectorAll("#"+clase+" select").forEach((s,i)=>{
s.value="🙂"
})

document.querySelectorAll("#"+clase+" select").forEach((s,i)=>{
let fila = Math.floor(i/5)
let col = i%5
guardar(clase,fila,col,"🙂")
})
}

// CAMBIAR PESTAÑA
function activar(clase){
document.querySelectorAll(".contenido").forEach(c=>c.classList.remove("activo"))
document.getElementById(clase).classList.add("activo")

document.querySelectorAll(".pestana").forEach(p=>p.classList.remove("activa"))
document.getElementById("btn-"+clase).classList.add("activa")
}

// EVENTOS
document.getElementById("btn-2B").onclick = () => activar("2B")
document.getElementById("btn-2A").onclick = () => activar("2A")

// INICIAR
crearTabla("2B")
crearTabla("2A")

</script>

</body>
</html>
