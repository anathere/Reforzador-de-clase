<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Reflexionamos sobre nuestra actitud en clase</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f0f0f0;
padding:20px;
}

h1{
font-size:20px;
margin-bottom:0;
}

.barra{
display:flex;
height:15px;
margin-top:6px;
margin-bottom:10px;
}

.barra div:nth-child(1){background:#d8e6a5;flex:2;}
.barra div:nth-child(2){background:#f3b56c;flex:4;}
.barra div:nth-child(3){background:#8ec5d6;flex:2;}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #aaa;
text-align:center;
padding:6px;
}

th{
background:#e6e6e6;
font-size:12px;
}

.nombre{
background:#e6e6e6;
text-align:left;
font-weight:bold;
width:120px;
}

.icono{
font-size:24px;
display:block;
margin-bottom:5px;
}

select{
border:none;
font-size:18px;
background:transparent;
cursor:pointer;
}

.fila-color-1{background:#fff5e6;}
.fila-color-2{background:#e6f5ff;}
.fila-color-3{background:#f0ffe6;}
.fila-color-4{background:#ffe6f5;}

.boton-felices{
margin-bottom:15px;
padding:10px 20px;
font-size:16px;
background:#d8e6a5;
border:2px solid #a5c373;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.boton-felices:hover{
background:#c5d88a;
}

</style>

</head>

<body>

<h1>Reflexionamos sobre nuestra actitud en clase</h1>

<div class="barra">
<div></div>
<div></div>
<div></div>
</div>

<button class="boton-felices" onclick="ponerTodosFelices()">😊 Poner a todos felices</button>

<table>

<tr>

<th></th>

<th>
<span class="icono">📦</span>
Cuidar mis<br>materiales
</th>

<th>
<span class="icono">🤝</span>
Cuidar mi cuerpo<br>y el de mis compañeros
</th>

<th>
<span class="icono">📋</span>
Respetar<br>las consignas
</th>

<th>
<span class="icono">🔇</span>
Trabajar<br>en silencio
</th>

<th>
<span class="icono">👂</span>
Escuchar<br>a la maestra
</th>

</tr>

<tbody id="tabla"></tbody>

</table>

<script>

const alumnos = [
"Agustín","Facu","Felipe","Juanfra","Juanma",
"Julia","Lara","Lola","Lua","Luca",
"Lupe","Pili","Santi","Titi","Lolo","Guille","Toto"
]

const colores = ["fila-color-1","fila-color-2","fila-color-3","fila-color-4"]

function selector(){
return `
<select>
<option>•</option>
<option>🙂</option>
<option>😐</option>
<option>🙁</option>
</select>
`
}

let html=""

for(let i = 0; i < alumnos.length; i++){
let alumno = alumnos[i]
let colorClase = colores[i % colores.length]

html+=`
<tr class="${colorClase}">

<td class="nombre">${alumno}</td>

<td>${selector()}</td>
<td>${selector()}</td>
<td>${selector()}</td>
<td>${selector()}</td>
<td>${selector()}</td>

</tr>

`
}

document.getElementById("tabla").innerHTML = html

function ponerTodosFelices(){
const selects = document.querySelectorAll("select")
selects.forEach(select => {
select.value = "🙂"
})
}

</script>

</body>
</html>
