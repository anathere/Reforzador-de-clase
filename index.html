<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reflexionamos sobre nuestra actitud en clase</title>

<style>
body{
font-family: Arial;
background:#f2f4f8;
padding:20px;
}

h1{
font-size:22px;
margin-bottom:5px;
}

.barra{
display:flex;
height:15px;
margin-bottom:15px;
border-radius:10px;
overflow:hidden;
}

.barra div:nth-child(1){background:#d8e6a5;flex:2;}
.barra div:nth-child(2){background:#f3b56c;flex:4;}
.barra div:nth-child(3){background:#8ec5d6;flex:2;}

.pestanas{
display:flex;
gap:8px;
margin-bottom:15px;
}

.pestana{
padding:10px 18px;
background:#e0e0e0;
border:none;
border-radius:10px 10px 0 0;
cursor:pointer;
font-weight:bold;
}

.pestana.activa{
background:#ffffff;
box-shadow:0 -2px 6px rgba(0,0,0,0.08);
}

.contenido{
display:none;
background:white;
padding:15px;
border-radius:0 10px 10px 10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.contenido.activo{
display:block;
}

.boton-felices{
margin-bottom:12px;
padding:8px 16px;
font-size:15px;
background:#d8e6a5;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

table{
border-collapse:collapse;
width:100%;
}

th{
background:#f0f0f0;
font-size:12px;
padding:6px;
}

td{
border:1px solid #ddd;
padding:5px;
text-align:center;
background:white;
transition:0.2s;
}

.nombre{
background:#f0f0f0;
text-align:left;
font-weight:bold;
width:130px;
}

.icono{
font-size:20px;
display:block;
margin-bottom:3px;
}

select{
border:none;
font-size:20px;
background:transparent;
cursor:pointer;
}

/* COLORES DE CELDA */
.verde{
background:#d4edda !important;
}

.amarillo{
background:#fff3cd !important;
}

.rojo{
background:#f8d7da !important;
}

.gris{
background:white;
}

</style>
</head>

<body>

<h1>Reflexionamos sobre nuestra actitud en clase</h1>

<div class="barra">
<div></div>
<div></div>
<div></div>
</div>

<div class="pestanas">
<button id="btn-2B" class="pestana activa">Clase 2B</button>
<button id="btn-2A" class="pestana">Clase 2A</button>
</div>

<div id="2B" class="contenido activo"></div>
<div id="2A" class="contenido"></div>

<script>

const clases = {
"2B": ["Agustín","Facu","Felipe","Juanfra","Juanma","Julia","Lara","Lola","Lua","Luca","Lupe","Pili","Santi","Titi","Lolo","Guille","Toto"],
"2A": ["Tomás","Timoteo","Alfo B","Paz","Alfo G","Juan","Mateo","Giuliana","Bruno","Francisco","Alfonso","Franco","Guada","Vicente","Felipe","Isa","Lorenzo","Benjamín","Sofía"]
}

const criterios = [
{icono:"📦", texto:"Cuidar materiales"},
{icono:"🤝", texto:"Cuidar cuerpos"},
{icono:"📋", texto:"Respetar consignas"},
{icono:"🔇", texto:"Trabajar en silencio"},
{icono:"👂", texto:"Escuchar"}
]

function colorClase(valor){
if(valor=="🙂") return "verde"
if(valor=="😐") return "amarillo"
if(valor=="🙁") return "rojo"
return "gris"
}

function crearTabla(clase){
let html = `<button class="boton-felices" onclick="felices('${clase}')">😊 Poner a todos felices</button>`
html += "<table><tr><th></th>"

criterios.forEach(c=>{
html += `<th><span class="icono">${c.icono}</span>${c.texto}</th>`
})

html += "</tr>"

clases[clase].forEach((alumno,i)=>{

html += `<tr><td class="nombre">${alumno}</td>`

criterios.forEach((c,j)=>{
let val = obtener(clase,i,j)

html += `<td class="${colorClase(val)}">
<select onchange="cambiarColor(this); guardar('${clase}',${i},${j},this.value)">
<option ${val=="•"?"selected":""}>•</option>
<option ${val=="🙂"?"selected":""}>🙂</option>
<option ${val=="😐"?"selected":""}>😐</option>
<option ${val=="🙁"?"selected":""}>🙁</option>
</select>
</td>`
})

html += "</tr>"
})

html += "</table>"

document.getElementById(clase).innerHTML = html
}

function cambiarColor(select){
let td = select.parentElement
td.classList.remove("verde","amarillo","rojo","gris")
td.classList.add(colorClase(select.value))
}

function guardar(clase,i,j,val){
let datos = JSON.parse(localStorage.getItem("datos")) || {}
datos[clase] = datos[clase] || []
datos[clase][i] = datos[clase][i] || []
datos[clase][i][j] = val
localStorage.setItem("datos", JSON.stringify(datos))
}

function obtener(clase,i,j){
let datos = JSON.parse(localStorage.getItem("datos")) || {}
return datos[clase]?.[i]?.[j] || "•"
}

function felices(clase){
document.querySelectorAll("#"+clase+" select").forEach((s,i)=>{
s.value="🙂"
cambiarColor(s)
})

document.querySelectorAll("#"+clase+" select").forEach((s,i)=>{
let fila = Math.floor(i/5)
let col = i%5
guardar(clase,fila,col,"🙂")
})
}

function activar(clase){
document.querySelectorAll(".contenido").forEach(c=>c.classList.remove("activo"))
document.getElementById(clase).classList.add("activo")

document.querySelectorAll(".pestana").forEach(p=>p.classList.remove("activa"))
document.getElementById("btn-"+clase).classList.add("activa")
}

document.getElementById("btn-2B").onclick = () => activar("2B")
document.getElementById("btn-2A").onclick = () => activar("2A")

crearTabla("2B")
crearTabla("2A")

</script>

</body>
</html>
